<h1>Albums</h1>

<div *ngIf="loading" class="loading">Loading albums...</div>

<div *ngIf="!loading && albums.length === 0" class="empty">No albums found.</div>

<ul *ngIf="!loading" class="album-list">
  <li *ngFor="let album of albums" class="album-item" (click)="goToAlbum(album.id)">
    <span class="album-id">#{{ album.id }}</span>
    <span class="album-title">{{ album.title }}</span>
    <button class="btn-delete" (click)="deleteAlbum($event, album.id)">Delete</button>
  </li>
</ul>
